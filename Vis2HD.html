<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generative Audio Visualizer</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; position: fixed; font-family: sans-serif; }
        canvas { display: block; touch-action: none; width: 100vw; height: 100vh; }
        
        /* Controlli UI */
        .controls {
            position: absolute; display: flex; flex-direction: column; gap: 15px; z-index: 10;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s ease; 
            opacity: 1; pointer-events: auto;
        }

        /* Stato quando nascosti (solo in fullscreen) */
        .controls.ui-hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Layout Smartphone Verticale (Portrait) */
        @media (orientation: portrait) {
            .controls { bottom: 40px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; }
            .btn-group { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
            .controls.ui-hidden { transform: translate(-50%, 20px); }
        }

        /* Layout Desktop e Smartphone Orizzontale (Landscape) */
        @media (orientation: landscape) {
            .controls { right: 30px; bottom: 30px; width: 130px; align-items: stretch; }
            .btn-group { display: flex; flex-direction: column; gap: 8px; }
            .scrub-container { width: 100%; order: 2; } 
            .btn-group { order: 1; }
            .controls.ui-hidden { transform: translateX(20px); }
        }

        .btn {
            padding: 14px 10px; background: rgba(255, 255, 255, 0.12); color: white;
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 12px;
            cursor: pointer; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            font-weight: bold; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
            user-select: none; transition: all 0.2s; -webkit-tap-highlight-color: transparent; text-align: center;
        }
        .btn:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.25); }
        #scrub-bar { width: 100%; cursor: pointer; accent-color: #fff; height: 6px; opacity: 0.8; }
        #audio-input { display: none; }
    </style>
</head>
<body>
    <div id="ui-controls" class="controls">
        <div class="scrub-container"><input type="range" id="scrub-bar" value="0" step="0.1"></div>
        <div class="btn-group">
            <label for="audio-input" class="btn">Carica</label>
            <input type="file" id="audio-input" accept="audio/*">
            <button id="play-pause-btn" class="btn">Play/Pausa</button>
            <button id="regen-btn" class="btn">Nuova</button>
            <button id="fullscreen-btn" class="btn">Full</button>
        </div>
    </div>
    <canvas id="c"></canvas>

<script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true, antialias: false });
    const ui = document.getElementById('ui-controls');
    const audioInput = document.getElementById('audio-input');
    const scrubBar = document.getElementById('scrub-bar');
    const ppBtn = document.getElementById('play-pause-btn');
    
    let w, h, dpr, a, b, c, d, x, y;
    let audioCtx, analyser, dataArray, source, audioObj;
    let audioInertia = 0, colorInertia = 0;

    // --- GESTIONE INTERFACCIA (UI) ---
    let uiTimer;

    function showUI() {
        ui.classList.remove('ui-hidden');
        clearTimeout(uiTimer);
        
        // Se siamo in Fullscreen, attiva il timer per nascondere
        if (document.fullscreenElement) {
            uiTimer = setTimeout(() => {
                ui.classList.add('ui-hidden');
            }, 3000);
        }
    }

    // Gestione click/touch globale
    window.addEventListener('pointerdown', (e) => {
        if (!document.fullscreenElement) return; // Se non è full screen, restano fissi

        if (ui.contains(e.target)) {
            showUI(); // Reset timer se interagisco con i tasti
        } else {
            // Se tocco fuori: alterna visibilità
            if (!ui.classList.contains('ui-hidden')) {
                ui.classList.add('ui-hidden');
                clearTimeout(uiTimer);
            } else {
                showUI();
            }
        }
    });

    // Mostra se muovo il mouse (per desktop)
    window.addEventListener('pointermove', () => {
        if (document.fullscreenElement) showUI();
    });

    // Reset quando si cambia modalità fullscreen
    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
            ui.classList.remove('ui-hidden');
            clearTimeout(uiTimer);
        } else {
            showUI();
        }
    });

    // --- LOGICA GRAFICA (WEBGL) ---
    const iterations = 65000; 
    const points = new Float32Array(iterations * 2);

    function createShader(type, src) {
        const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
        return s;
    }
    function createProgram(vsSrc, fsSrc) {
        const p = gl.createProgram(); 
        gl.attachShader(p, createShader(gl.VERTEX_SHADER, vsSrc));
        gl.attachShader(p, createShader(gl.FRAGMENT_SHADER, fsSrc)); 
        gl.linkProgram(p); return p;
    }

    const fadeProg = createProgram(
        `attribute vec2 pos; void main(){ gl_Position = vec4(pos, 0.0, 1.0); }`,
        `precision lowp float; void main(){ gl_FragColor = vec4(0.0, 0.0, 0.0, 0.1); }`
    );
    
    const partProg = createProgram(
        `attribute vec2 pos; 
        uniform vec2 uRes; 
        uniform vec2 uMin; 
        uniform vec2 uMax;
        uniform float uA; 
        uniform float uCIn; 
        uniform float uDpr; 
        varying vec3 vColor;
        vec3 h2r(vec3 c) { 
            vec3 rgb = clamp(abs(mod(c.x*6.0+vec3(0.0,4.0,2.0),6.0)-3.0)-1.0, 0.0, 1.0); 
            return c.z + c.y * (rgb-0.5)*(1.0-abs(2.0*c.z-1.0)); 
        }
        void main(){
            float aspect = uRes.x / uRes.y;
            vec2 center = (uMin + uMax) * 0.5;
            vec2 size = max(uMax - uMin, vec2(0.1));
            float scale = 1.7 / max(size.x / aspect, size.y);
            vec2 p = (pos - center) * scale;
            p.x /= aspect; 
            gl_Position = vec4(p, 0.0, 1.0);
            gl_PointSize = 0.8 * uDpr;
            vColor = h2r(vec3(fract((length(pos)*40.0 + uA*50.0 + uCIn*80.0)/360.0), 0.8, 0.6));
        }`,
        `precision lowp float; varying vec3 vColor; void main(){ gl_FragColor = vec4(vColor, 0.25); }`
    );

    const uResLoc = gl.getUniformLocation(partProg, "uRes");
    const uMinLoc = gl.getUniformLocation(partProg, "uMin");
    const uMaxLoc = gl.getUniformLocation(partProg, "uMax");
    const uALoc = gl.getUniformLocation(partProg, "uA");
    const uCInLoc = gl.getUniformLocation(partProg, "uCIn");
    const uDprLoc = gl.getUniformLocation(partProg, "uDpr");

    const quadBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    const partBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, partBuf);
    gl.bufferData(gl.ARRAY_BUFFER, points.byteLength, gl.DYNAMIC_DRAW);

    function randomize() {
        a = (Math.random() * 4 - 2); b = (Math.random() * 4 - 2);
        c = (Math.random() * 4 - 2); d = (Math.random() * 4 - 2);
        x = 0.1; y = 0.1;
        gl.clearColor(0, 0, 0, 1); gl.clear(gl.COLOR_BUFFER_BIT);
    }

    function draw() {
        if (analyser && audioObj && !audioObj.paused) {
            analyser.getByteFrequencyData(dataArray);
            audioInertia += (dataArray[2] / 255 - audioInertia) * 0.1;
            colorInertia += (dataArray[10] / 255 - colorInertia) * 0.05;
        } else { audioInertia *= 0.9; colorInertia *= 0.9; }

        let mC = c + (audioInertia * 0.2), mD = d + (colorInertia * 0.2);
        let cx = x, cy = y;
        let miX = 1e3, maX = -1e3, miY = 1e3, maY = -1e3;

        for (let i = 0; i < iterations; i++) {
            let ox = cx, oy = cy;
            cx = Math.sin(a * oy) + mC * Math.cos(a * ox);
            cy = Math.sin(b * ox) + mD * Math.cos(b * oy);
            points[i*2] = cx; points[i*2+1] = cy;
            if(cx < miX) miX = cx; if(cx > maX) maX = cx;
            if(cy < miY) miY = cy; if(cy > maY) maY = cy;
        }
        x = cx; y = cy; a += 0.0001; b += 0.0001;

        gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        gl.useProgram(fadeProg); gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
        const fPos = gl.getAttribLocation(fadeProg, "pos");
        gl.enableVertexAttribArray(fPos); gl.vertexAttribPointer(fPos, 2, gl.FLOAT, false, 0, 0);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

        gl.blendFunc(gl.SRC_ALPHA, gl.ONE); gl.useProgram(partProg);
        gl.uniform2f(uResLoc, w, h);
        gl.uniform2f(uMinLoc, miX, miY);
        gl.uniform2f(uMaxLoc, maX, maY);
        gl.uniform1f(uALoc, a); gl.uniform1f(uCInLoc, colorInertia); gl.uniform1f(uDprLoc, dpr);

        gl.bindBuffer(gl.ARRAY_BUFFER, partBuf); gl.bufferSubData(gl.ARRAY_BUFFER, 0, points);
        const pPos = gl.getAttribLocation(partProg, "pos");
        gl.enableVertexAttribArray(pPos); gl.vertexAttribPointer(pPos, 2, gl.FLOAT, false, 0, 0);
        gl.drawArrays(gl.POINTS, 0, iterations);
        requestAnimationFrame(draw);
    }

    audioInput.onchange = function() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }
        audioCtx.resume();
        if(audioObj) audioObj.pause();
        audioObj = new Audio(URL.createObjectURL(this.files[0]));
        source = audioCtx.createMediaElementSource(audioObj);
        source.connect(analyser); analyser.connect(audioCtx.destination);
        audioObj.play(); ppBtn.textContent = "Pausa"; randomize();
        audioObj.ontimeupdate = () => { if(!isDragging) scrubBar.value = (audioObj.currentTime / audioObj.duration) * 100; };
    };

    ppBtn.onclick = (e) => { 
        if(!audioObj) return;
        if (audioObj.paused) audioObj.play(); else audioObj.pause(); 
        ppBtn.textContent = audioObj.paused ? "Play" : "Pausa"; 
    };

    let isDragging = false;
    scrubBar.oninput = () => isDragging = true;
    scrubBar.onchange = () => { if(audioObj) audioObj.currentTime = (scrubBar.value / 100) * audioObj.duration; isDragging = false; };
    
    document.getElementById('regen-btn').onclick = () => randomize();
    document.getElementById('fullscreen-btn').onclick = () => { 
        if (!document.fullscreenElement) document.documentElement.requestFullscreen(); 
        else document.exitFullscreen(); 
    };

    function init() {
        dpr = window.devicePixelRatio || 1; w = window.innerWidth; h = window.innerHeight;
        canvas.width = w * dpr; canvas.height = h * dpr;
        gl.viewport(0, 0, w * dpr, h * dpr);
    }
    window.addEventListener('resize', init);
    init(); randomize(); draw();
</script>
</body>
</html>
